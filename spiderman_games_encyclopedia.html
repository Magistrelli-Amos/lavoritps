    plot:'Peter and Miles both operate as Spider-Man. Peter bonds with the Venom symbiote, which gradually corrupts him. Meanwhile, Kraven the Hunter invades New York to find worthy prey, setting up a catastrophic collision of threats.',
    gameplay:'The biggest entry yet — a dual open-world map covering both Manhattan and Queens/Brooklyn. Players switch between Peter and Miles fluidly. Peter\'s symbiote mechanics add brutal new combos. Web Wings allow gliding. 15–20 hour campaign.',
    cast:'Yuri Lowenthal, Nadji Jeter, Tony Todd as Venom, Jim Pirri as Kraven. Developed by Insomniac Games, published by Sony.'
  }
];

function toggleDetails(id){
  const el=document.getElementById('det-'+id);
  const btn=document.getElementById('btn-'+id);
  if(el.classList.contains('open')){el.classList.remove('open');btn.textContent='▼ Show details';}
  else{el.classList.add('open');btn.textContent='▲ Hide details';}
}

function filterEra(era,btn){
  document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const cards=document.querySelectorAll('.card');
  let count=0;
  cards.forEach(c=>{
    if(era==='all'||c.dataset.era===era){c.style.display='';count++;}
    else{c.style.display='none';}
  });
  document.getElementById('counter').textContent='Showing '+count+' game'+(count!==1?'s':'');
}

function buildGrid(){
  const grid=document.getElementById('grid');
  games.forEach(g=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.era=g.era;
    card.innerHTML=`
      <img class="card-img" src="${g.img}" alt="${g.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-img-placeholder" style="display:none">🕷</div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-title">${g.title}</div>
          <span class="year-badge">${g.year}</span>
        </div>
        <span class="platform-badge">${g.platform}</span>
        <button class="expand-btn" id="btn-${g.id}" onclick="toggleDetails(${g.id})">▼ Show details</button>
        <div class="details" id="det-${g.id}">
          <div class="detail-section">
            <div class="detail-label">Plot</div>
            <div class="detail-text">${g.plot}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Gameplay</div>
            <div class="detail-text">${g.gameplay}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Cast & Developer</div>
            <div class="detail-text">${g.cast}</div>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}
buildGrid();
</script>

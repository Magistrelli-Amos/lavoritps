<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo</title>
  <link rel="stylesheet" href="store.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand">
      <img src="" class="store-logo" onerror="this.style.display='none'" alt="">
      <div class="brand-text">
        <span class="store-name">My Store</span>
        <span class="store-tagline"></span>
      </div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="active"><span>🏠</span> <span>Catalogo</span></a>
      <a href="cart.html" class="cart-btn">
        <span>🛒</span> <span>Carrello</span>
        <span id="cart-badge" style="display:none;"></span>
      </a>
      <a href="ini.html"><span>⚙️</span> <span>Config</span></a>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="page-hero" id="page-hero">
  <h1 class="store-name">My Store</h1>
  <p class="store-tagline"></p>
</div>

<!-- MAIN -->
<div class="container">

  <!-- NO CONFIG ALERT -->
  <div id="no-config" style="display:none; text-align:center; padding:80px 24px;">
    <div style="font-size:4rem;margin-bottom:16px;">📂</div>
    <h2 style="font-family:var(--font-display);font-size:1.8rem;margin-bottom:10px;">Nessun catalogo configurato</h2>
    <p style="color:var(--text-muted);margin-bottom:24px;">Carica il tuo file CSV dalla pagina di configurazione per visualizzare i prodotti.</p>
    <a href="ini.html" class="btn btn-primary btn-lg">⚙️ Configura il negozio</a>
  </div>

  <!-- FILTERS -->
  <div class="filters-bar" id="filters-bar" style="display:none;">
    <div class="search-box">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Cerca prodotti…" oninput="filterProducts()">
    </div>
    <select class="filter-select" id="brand-filter" onchange="filterProducts()">
      <option value="">Tutte le marche</option>
    </select>
    <select class="filter-select" id="sort-select" onchange="filterProducts()">
      <option value="">Ordine: predefinito</option>
      <option value="price-asc">Prezzo: crescente</option>
      <option value="price-desc">Prezzo: decrescente</option>
      <option value="name-asc">Nome: A-Z</option>
      <option value="name-desc">Nome: Z-A</option>
    </select>
    <span class="results-count" id="results-count"></span>
  </div>

  <!-- GRID -->
  <div class="product-grid" id="product-grid"></div>

</div>

<div class="toast-container" id="toast-container"></div>

<script src="store.js"></script>
<script>
let allProducts = [];
let cfg = {};

async function init() {
  cfg = getConfig();
  if (!cfg.csvData) {
    document.getElementById('no-config').style.display = 'block';
    document.getElementById('filters-bar').style.display = 'none';
    return;
  }

  allProducts = parseCSV(cfg.csvData);

  // Apply column mapping
  if (cfg.mapping) {
    allProducts = allProducts.map(p => remapProduct(p, cfg.mapping));
  }

  if (allProducts.length === 0) {
    document.getElementById('no-config').style.display = 'block';
    return;
  }

  document.getElementById('filters-bar').style.display = 'flex';
  populateBrandFilter();
  renderProducts(allProducts);
}

function remapProduct(p, mapping) {
  const result = { ...p };
  Object.entries(mapping).forEach(([stdKey, csvKey]) => {
    if (csvKey && csvKey !== stdKey && p[csvKey] !== undefined) {
      result[stdKey] = p[csvKey];
    }
  });
  return result;
}

function populateBrandFilter() {
  const brands = [...new Set(allProducts.map(p => p.marca).filter(Boolean))].sort();
  const sel = document.getElementById('brand-filter');
  brands.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b;
    opt.textContent = b;
    sel.appendChild(opt);
  });
}

function filterProducts() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const brand = document.getElementById('brand-filter').value;
  const sort = document.getElementById('sort-select').value;

  let filtered = allProducts.filter(p => {
    const matchQ = !q ||
      (p.marca || '').toLowerCase().includes(q) ||
      (p.modello || '').toLowerCase().includes(q) ||
      (p.descrizione || '').toLowerCase().includes(q);
    const matchBrand = !brand || p.marca === brand;
    return matchQ && matchBrand;
  });

  if (sort === 'price-asc') filtered.sort((a,b) => parsePrice(a.prezzo) - parsePrice(b.prezzo));
  else if (sort === 'price-desc') filtered.sort((a,b) => parsePrice(b.prezzo) - parsePrice(a.prezzo));
  else if (sort === 'name-asc') filtered.sort((a,b) => (a.modello||'').localeCompare(b.modello||''));
  else if (sort === 'name-desc') filtered.sort((a,b) => (b.modello||'').localeCompare(a.modello||''));

  renderProducts(filtered);
}

function renderProducts(products) {
  const grid = document.getElementById('product-grid');
  const count = document.getElementById('results-count');
  const currency = cfg.currency || '€';
  const labels = cfg.labels || {};

  count.textContent = `${products.length} prodott${products.length === 1 ? 'o' : 'i'}`;

  if (products.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:12px;">🔍</div>
      <h3 style="font-family:var(--font-display);margin-bottom:6px;">Nessun prodotto trovato</h3>
      <p>Prova a modificare la ricerca o i filtri.</p>
    </div>`;
    return;
  }

  grid.innerHTML = products.map((p, i) => {
    const price = parsePrice(p.prezzo);
    const priceStr = price > 0 ? formatPrice(price, currency) : (p.prezzo || 'N/D');
    const imgUrl = p.immagine || '';
    const delay = Math.min(i * 60, 600);

    return `
    <div class="product-card" style="animation-delay:${delay}ms" onclick="openProduct(${i})">
      <div class="card-img-wrap">
        ${imgUrl
          ? `<img src="${escHtml(imgUrl)}" alt="${escHtml(p.modello||'')}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="card-img-placeholder" style="display:${imgUrl?'none':'flex'};align-items:center;justify-content:center;width:100%;height:100%">🛍️</div>
      </div>
      <div class="card-body">
        <div class="card-brand">${escHtml(p.marca || '')}</div>
        <div class="card-title">${escHtml(p.modello || '')}</div>
        <div class="card-desc">${escHtml(p.descrizione || '')}</div>
      </div>
      <div class="card-footer">
        <span class="card-price">${escHtml(priceStr)}</span>
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();quickAdd(${i})">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Aggiungi
        </button>
      </div>
    </div>`;
  }).join('');

  // Store reference for quickAdd by index
  window._filteredProducts = products;
}

function openProduct(index) {
  const p = window._filteredProducts[index];
  if (!p) return;
  // encode product as base64 in URL param
  const encoded = btoa(encodeURIComponent(JSON.stringify(p)));
  window.location.href = `product.html?d=${encoded}`;
}

function quickAdd(index) {
  const p = window._filteredProducts[index];
  if (!p) return;
  addToCart(p, 1);
  showToast(`✅ "${p.modello}" aggiunto al carrello!`, 'success');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = '') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

init();
</script>
</body>
</html>

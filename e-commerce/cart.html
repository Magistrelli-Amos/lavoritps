<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrello</title>
  <link rel="stylesheet" href="store.css">
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .checkout-steps {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
      border: 1.5px solid var(--border);
    }
    .step-item {
      flex: 1;
      padding: 12px 16px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-right: 1.5px solid var(--border);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .step-item:last-child { border-right: none; }
    .step-item.active { background: var(--accent); color: #fff; }
    .step-item.done { background: #16a34a; color: #fff; }

    .customer-form {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--card-radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .customer-form h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .order-confirmation {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border: 2px solid #16a34a;
      border-radius: var(--card-radius);
      padding: 32px;
      text-align: center;
      display: none;
    }
    .order-confirmation .conf-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .order-confirmation h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      color: #15803d;
      margin-bottom: 8px;
    }
    .order-confirmation p { color: #166534; margin-bottom: 20px; }

    .promo-row {
      display: flex;
      gap: 10px;
    }
    .promo-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
    }
    .promo-row input:focus { border-color: var(--accent); }

    .discount-badge {
      background: rgba(22,163,74,0.1);
      color: #16a34a;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(22,163,74,0.25);
    }

    .qty-mini {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .qty-mini button {
      width: 28px;
      height: 28px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .qty-mini button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .qty-mini span { font-weight: 700; font-size: 0.92rem; min-width: 24px; text-align: center; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand">
      <img src="" class="store-logo" onerror="this.style.display='none'" alt="">
      <div class="brand-text">
        <span class="store-name">My Store</span>
        <span class="store-tagline"></span>
      </div>
    </a>
    <div class="nav-links">
      <a href="index.html"><span>🏠</span> <span>Catalogo</span></a>
      <a href="cart.html" class="cart-btn active">
        <span>🛒</span> <span>Carrello</span>
        <span id="cart-badge" style="display:none;"></span>
      </a>
      <a href="ini.html"><span>⚙️</span> <span>Config</span></a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <h1>🛒 Il tuo Carrello</h1>
  <p id="cart-hero-sub">Rivedi i tuoi articoli prima di procedere</p>
</div>

<div id="cart-main">

  <!-- STEPS -->
  <div class="container" style="padding-top:24px;">
    <div class="checkout-steps" id="checkout-steps">
      <div class="step-item active" id="step-1">🛒 Carrello</div>
      <div class="step-item" id="step-2">👤 Dati</div>
      <div class="step-item" id="step-3">📄 Ordine PDF</div>
    </div>
  </div>

  <!-- STEP 1: CART LAYOUT -->
  <div id="view-cart">
    <div class="cart-layout" id="cart-container">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- STEP 2: CUSTOMER FORM -->
  <div id="view-form" style="display:none;">
    <div class="container" style="max-width:720px;padding-top:16px;padding-bottom:60px;">
      <div class="customer-form">
        <h3>👤 Dati acquirente</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Nome *</label>
            <input type="text" id="cust-name" placeholder="Mario">
          </div>
          <div class="form-group">
            <label>Cognome *</label>
            <input type="text" id="cust-surname" placeholder="Rossi">
          </div>
          <div class="form-group form-full">
            <label>Email *</label>
            <input type="email" id="cust-email" placeholder="mario.rossi@email.it">
          </div>
          <div class="form-group">
            <label>Telefono</label>
            <input type="tel" id="cust-phone" placeholder="+39 …">
          </div>
          <div class="form-group">
            <label>Codice Fiscale / P.IVA</label>
            <input type="text" id="cust-cf" placeholder="RSSMRA80A01H501Z">
          </div>
          <div class="form-group form-full">
            <label>Indirizzo di spedizione *</label>
            <input type="text" id="cust-address" placeholder="Via Roma 1, 20100 Milano MI">
          </div>
          <div class="form-group form-full">
            <label>Note ordine</label>
            <textarea id="cust-notes" rows="3" placeholder="Lascia eventuali istruzioni per la consegna…"></textarea>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:12px;justify-content:space-between;margin-top:8px;">
        <button class="btn btn-ghost btn-lg" onclick="goToStep(1)">← Torna al carrello</button>
        <button class="btn btn-primary btn-lg" onclick="goToStep(3)">Genera PDF ordine →</button>
      </div>
    </div>
  </div>

  <!-- STEP 3: ORDER CONFIRMATION -->
  <div id="view-confirm" style="display:none;">
    <div class="container" style="max-width:720px;padding-top:16px;padding-bottom:80px;">
      <div class="order-confirmation" id="order-conf">
        <div class="conf-icon">🎉</div>
        <h2>Ordine Pronto!</h2>
        <p id="conf-summary">Il tuo ordine è stato preparato. Clicca qui sotto per scaricare il riepilogo PDF.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-primary btn-lg" onclick="downloadPDF()">📄 Scarica PDF Ordine</button>
          <button class="btn btn-outline btn-lg" onclick="startNewOrder()">🛍️ Nuovo acquisto</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast-container" id="toast-container"></div>

<script src="store.js"></script>
<script>
let cfg = {};
let currentStep = 1;
let discount = 0;

function init() {
  cfg = getConfig();
  renderCart();
}

function renderCart() {
  const cart = getCart();
  const container = document.getElementById('cart-container');
  const currency = cfg.currency || '€';

  if (cart.length === 0) {
    container.innerHTML = `
      <div class="cart-empty">
        <div class="empty-icon">🛒</div>
        <h2>Il carrello è vuoto</h2>
        <p style="margin-bottom:24px;">Aggiungi qualche prodotto dal catalogo!</p>
        <a href="index.html" class="btn btn-primary btn-lg">🏪 Vai al catalogo</a>
      </div>`;
    document.getElementById('checkout-steps').style.display = 'none';
    return;
  }

  document.getElementById('checkout-steps').style.display = 'flex';

  const subtotal = cart.reduce((s, i) => s + parsePrice(i.prezzo) * (i.qty || 1), 0);
  const discountAmt = subtotal * (discount / 100);
  const total = subtotal - discountAmt;

  const itemsHtml = cart.map((item, idx) => {
    const price = parsePrice(item.prezzo);
    const qty = item.qty || 1;
    const imgUrl = item.immagine || '';
    return `
    <div class="cart-item" id="cart-item-${idx}">
      ${imgUrl
        ? `<img class="cart-item-img" src="${escHtml(imgUrl)}" alt="${escHtml(item.modello||'')}" onerror="this.src='';this.style.background='#f0f2f8'">`
        : `<div class="cart-item-img" style="background:#f0f2f8;display:flex;align-items:center;justify-content:center;font-size:2rem;border-radius:10px;">🛍️</div>`}
      <div class="cart-item-info">
        <div class="cart-item-brand">${escHtml(item.marca||'')}</div>
        <div class="cart-item-name">${escHtml(item.modello||'')}</div>
        <div class="cart-item-price">${formatPrice(price, currency)} cad.</div>
      </div>
      <div class="qty-mini">
        <button onclick="updateQty(${idx}, -1)">−</button>
        <span>${qty}</span>
        <button onclick="updateQty(${idx}, 1)">+</button>
      </div>
      <div class="cart-item-total">${formatPrice(price * qty, currency)}</div>
      <button class="cart-item-remove" onclick="removeItem(${idx})" title="Rimuovi">✕</button>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="cart-items">${itemsHtml}</div>
    <div class="cart-summary">
      <h2>Riepilogo ordine</h2>
      <div class="summary-row"><span>Articoli (${cart.reduce((s,i)=>s+(i.qty||1),0)})</span><span>${formatPrice(subtotal, currency)}</span></div>
      ${discount > 0 ? `<div class="summary-row" style="color:#16a34a;"><span>Sconto (${discount}%)</span><span>−${formatPrice(discountAmt, currency)}</span></div>` : ''}
      <div class="summary-row"><span>Spedizione</span><span style="color:#16a34a;">Gratuita</span></div>
      <div class="summary-row total"><span>Totale</span><span>${formatPrice(total, currency)}</span></div>

      <div>
        <div style="font-size:.78rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;">Codice promo</div>
        <div class="promo-row">
          <input type="text" id="promo-input" placeholder="Inserisci codice…">
          <button class="btn btn-ghost btn-sm" onclick="applyPromo()">Applica</button>
        </div>
        <div id="promo-msg" style="margin-top:6px;font-size:.8rem;"></div>
      </div>

      <button class="btn btn-primary btn-lg" onclick="goToStep(2)" style="width:100%;justify-content:center;">
        Procedi → Dati acquirente
      </button>
      <button class="btn btn-ghost btn-sm" onclick="if(confirm('Svuotare il carrello?')){clearCart();renderCart();}" style="color:var(--accent2);width:100%;justify-content:center;">
        🗑 Svuota carrello
      </button>
    </div>`;
}

function updateQty(idx, delta) {
  const cart = getCart();
  const item = cart[idx];
  if (!item) return;
  item.qty = Math.max(1, (item.qty || 1) + delta);
  saveCart(cart);
  updateCartBadge();
  renderCart();
}

function removeItem(idx) {
  removeFromCart(idx);
  updateCartBadge();
  renderCart();
  showToast('Articolo rimosso', '');
}

function applyPromo() {
  const code = (document.getElementById('promo-input').value || '').trim().toUpperCase();
  const promos = { 'SAVE10': 10, 'WELCOME20': 20, 'ESTATE15': 15 };
  const msg = document.getElementById('promo-msg');
  if (promos[code]) {
    discount = promos[code];
    msg.innerHTML = `<span class="discount-badge">✅ Sconto ${discount}% applicato!</span>`;
    renderCart();
  } else {
    discount = 0;
    msg.innerHTML = `<span style="color:var(--accent2);font-size:.8rem;">❌ Codice non valido</span>`;
  }
}

function goToStep(step) {
  if (step === 2) {
    const cart = getCart();
    if (cart.length === 0) { showToast('Il carrello è vuoto!', 'error'); return; }
  }
  if (step === 3) {
    const name = document.getElementById('cust-name')?.value.trim();
    const email = document.getElementById('cust-email')?.value.trim();
    const address = document.getElementById('cust-address')?.value.trim();
    if (!name || !email || !address) {
      showToast('⚠️ Compila i campi obbligatori: Nome, Email, Indirizzo', 'error');
      return;
    }
    // Store customer data in config temporarily
    const custData = {
      name: name + ' ' + document.getElementById('cust-surname').value.trim(),
      email,
      phone: document.getElementById('cust-phone').value,
      cf: document.getElementById('cust-cf').value,
      address,
      notes: document.getElementById('cust-notes').value,
    };
    sessionStorage.setItem('customerData', JSON.stringify(custData));
    buildConfirmation(custData);
  }

  currentStep = step;
  document.getElementById('view-cart').style.display = step === 1 ? 'block' : 'none';
  document.getElementById('view-form').style.display = step === 2 ? 'block' : 'none';
  document.getElementById('view-confirm').style.display = step === 3 ? 'block' : 'none';
  document.getElementById('order-conf').style.display = step === 3 ? 'block' : 'none';

  ['step-1','step-2','step-3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step-item' + (i + 1 < step ? ' done' : i + 1 === step ? ' active' : '');
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildConfirmation(cust) {
  const cart = getCart();
  const currency = cfg.currency || '€';
  const total = cart.reduce((s, i) => s + parsePrice(i.prezzo) * (i.qty || 1), 0);
  document.getElementById('conf-summary').textContent =
    `Ciao ${cust.name}! Il tuo ordine da ${formatPrice(total, currency)} con ${cart.length} articol${cart.length===1?'o':'i'} è pronto. Scarica il PDF per il tuo archivio.`;
}

function downloadPDF() {
  try {
    const custData = JSON.parse(sessionStorage.getItem('customerData') || '{}');
    generateOrderPDFWithCustomer(custData);
    showToast('📄 PDF scaricato!', 'success');
  } catch(e) {
    showToast('Errore generazione PDF', 'error');
    console.error(e);
  }
}

function generateOrderPDFWithCustomer(cust) {
  const cart = getCart();
  const currency = cfg.currency || '€';
  const storeName = cfg.storeName || 'My Store';
  const accentHex = (cfg.accentColor || '#0f3460').replace('#', '');

  function hexToRgb(hex) {
    const r = parseInt(hex.substring(0,2),16);
    const g = parseInt(hex.substring(2,4),16);
    const b = parseInt(hex.substring(4,6),16);
    return [r,g,b];
  }
  const [ar,ag,ab] = hexToRgb(accentHex.padEnd(6,'0'));

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });

  // ── HEADER ──
  doc.setFillColor(ar,ag,ab);
  doc.rect(0, 0, 210, 42, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(24);
  doc.text(storeName, 15, 20);
  if (cfg.storeTagline) {
    doc.setFontSize(10);
    doc.setFont('helvetica','normal');
    doc.text(cfg.storeTagline, 15, 28);
  }
  doc.setFontSize(10);
  const now = new Date();
  const orderNum = 'ORD-' + now.getFullYear() + '-' + String(Date.now()).slice(-6);
  doc.text('N° Ordine: ' + orderNum, 15, 36);
  doc.text('Data: ' + now.toLocaleDateString('it-IT'), 130, 20);
  doc.text('Ora: ' + now.toLocaleTimeString('it-IT'), 130, 28);

  doc.setTextColor(30,30,30);
  let y = 55;

  // ── CUSTOMER INFO ──
  if (cust && cust.name) {
    doc.setFillColor(245,246,250);
    doc.rect(10, y-6, 190, 38, 'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(11);
    doc.text('Dati Acquirente', 15, y);
    y += 8;
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.text('Nome: ' + cust.name, 15, y); y += 6;
    doc.text('Email: ' + (cust.email||''), 15, y);
    doc.text('Tel: ' + (cust.phone||'—'), 110, y); y += 6;
    doc.text('Indirizzo: ' + (cust.address||''), 15, y); y += 6;
    if (cust.cf) { doc.text('CF / P.IVA: ' + cust.cf, 15, y); y += 6; }
    if (cust.notes) { doc.text('Note: ' + cust.notes.substring(0,80), 15, y); y += 6; }
    y += 4;
  }

  // ── PRODUCTS TABLE ──
  doc.setFillColor(ar,ag,ab);
  doc.rect(10, y-6, 190, 10, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.text('Marca / Modello', 13, y);
  doc.text('Descrizione', 75, y);
  doc.text('Qtà', 133, y);
  doc.text('Prezzo', 146, y);
  doc.text('Subtotale', 172, y);
  y += 7;
  doc.setTextColor(30,30,30);

  let grandTotal = 0;
  cart.forEach((item, idx) => {
    if (y > 255) { doc.addPage(); y = 20; }
    const price = parsePrice(item.prezzo);
    const qty = item.qty || 1;
    const rowTotal = price * qty;
    grandTotal += rowTotal;

    if (idx % 2 === 0) { doc.setFillColor(249,250,255); doc.rect(10, y-5, 190, 9, 'F'); }

    doc.setFont('helvetica','bold');
    doc.setFontSize(9);
    doc.text(String(item.marca||'').substring(0,14), 13, y);
    doc.setFont('helvetica','normal');
    doc.text(String(item.modello||'').substring(0,18), 13, y+4);

    const desc = String(item.descrizione||'').substring(0,38);
    doc.text(desc, 75, y);

    doc.text(String(qty), 135, y);
    doc.text(formatPrice(price, currency), 143, y);
    doc.setFont('helvetica','bold');
    doc.text(formatPrice(rowTotal, currency), 170, y);
    y += 10;
  });

  // ── TOTALS ──
  y += 4;
  doc.setDrawColor(200,200,210);
  doc.line(10, y, 200, y);
  y += 8;

  const discountAmt = grandTotal * (discount / 100);
  const finalTotal = grandTotal - discountAmt;

  if (discount > 0) {
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.text('Subtotale:', 130, y);
    doc.text(formatPrice(grandTotal, currency), 178, y, {align:'right'});
    y += 7;
    doc.setTextColor(22,163,74);
    doc.text(`Sconto ${discount}%:`, 130, y);
    doc.text('−' + formatPrice(discountAmt, currency), 178, y, {align:'right'});
    y += 7;
    doc.setTextColor(30,30,30);
  }

  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setFillColor(ar,ag,ab);
  doc.rect(110, y-6, 90, 12, 'F');
  doc.setTextColor(255,255,255);
  doc.text('TOTALE: ' + formatPrice(finalTotal, currency), 155, y+1, {align:'center'});
  doc.setTextColor(30,30,30);

  // ── FOOTER ──
  const footerY = 282;
  doc.setFillColor(245,246,250);
  doc.rect(0, footerY-4, 210, 16, 'F');
  doc.setFont('helvetica','italic');
  doc.setFontSize(8);
  doc.setTextColor(120,120,140);
  doc.text('Grazie per il tuo acquisto! — ' + storeName, 105, footerY+1, {align:'center'});
  if (cfg.storeEmail) doc.text('Contatti: ' + cfg.storeEmail, 105, footerY+6, {align:'center'});

  doc.save('ordine-' + orderNum + '.pdf');
}

function startNewOrder() {
  clearCart();
  updateCartBadge();
  goToStep(1);
  renderCart();
  sessionStorage.removeItem('customerData');
  showToast('✅ Pronto per un nuovo ordine!', 'success');
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = '') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

init();
</script>
</body>
</html>
